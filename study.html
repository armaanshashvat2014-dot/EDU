<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop Study Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
padding:20px;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

h1{
color:#22d3ee;
}

select,button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
font-size:15px;
}

button{
background:#22d3ee;
font-weight:bold;
cursor:pointer;
}

#status,#hintBox,#weakBox,#focusBox{
margin-top:18px;
font-size:18px;
font-weight:bold;
}

#hintBox{color:#facc15;}
#weakBox{color:#f87171;}
#focusBox{color:#fb7185;}
</style>
</head>
<body>

<div class="container">
<h1>📚 MentorLoop Study Mode</h1>

<select id="gradeSelect" onchange="loadTopics()">
<option value="">Select Grade</option>
<option value="6">Grade 6</option>
<option value="7">Grade 7</option>
<option value="8">Grade 8</option>
<option value="9">Grade 9</option>
</select>

<select id="topicSelect" onchange="loadBooks()">
<option value="">Select Topic</option>
</select>

<select id="bookSelect">
<option value="">Select Book</option>
</select>

<br>

<button onclick="openBook()">Open Book</button>
<button onclick="showHint()">Hint</button>
<button onclick="markWeak()">Weak Topic</button>

<div id="status"></div>
<div id="hintBox"></div>
<div id="weakBox"></div>
<div id="focusBox"></div>
</div>

<script>
let activeGrade="";
let activeTopic="";
let activeBook="";
let tabSwitches=0;

const library={
"7":{
"Math":{
"Student Book":"CIE_7_SB_Math.pdf",
"Workbook":"CIE_7_WB_Math.pdf"
},
"Science":{
"Book 1":"CIE_7_SB_1_Sci.pdf",
"Book 2":"CIE_7_SB_2_Sci.pdf",
"Workbook":"CIE_7_WB_Sci.pdf"
},
"English":{
"Book 1":"CIE_7_SB_1_Eng.pdf",
"Book 2":"CIE_7_SB_2_Eng.pdf"
}
},
"8":{
"Math":{
"Student Book":"CIE_8_SB_Math.pdf",
"Workbook":"CIE_8_WB.pdf"
},
"Science":{
"Book 1":"CIE_8_SB_1_Sci.pdf",
"Book 2":"CIE_8_SB_2_Sci.pdf"
}
},
"9":{
"Science":{
"Book 1":"CIE_9_SB_1_Sci.pdf",
"Book 2":"CIE_9_SB_2_Sci.pdf"
},
"Math":{
"Student Book":"CIE_9_SB_Math.pdf"
}
}
};

const hints={
"Math":"Solve one step at a time.",
"Science":"Understand why the concept happens.",
"English":"Use nearby sentences for clues.",
"General":"Read examples carefully."
};

function loadTopics(){
const grade=gradeSelect.value;
topicSelect.innerHTML='<option value="">Select Topic</option>';
bookSelect.innerHTML='<option value="">Select Book</option>';

if(!library[grade]) return;

Object.keys(library[grade]).forEach(topic=>{
topicSelect.innerHTML+=`<option value="${topic}">${topic}</option>`;
});
}

function loadBooks(){
const grade=gradeSelect.value;
const topic=topicSelect.value;

bookSelect.innerHTML='<option value="">Select Book</option>';

if(!library[grade] || !library[grade][topic]) return;

Object.keys(library[grade][topic]).forEach(book=>{
bookSelect.innerHTML+=`<option value="${book}">${book}</option>`;
});
}

function openBook(){
activeGrade=gradeSelect.value;
activeTopic=topicSelect.value;
activeBook=bookSelect.value;

if(!activeGrade || !activeTopic || !activeBook){
alert("Select grade, topic and book");
return;
}

const file=library[activeGrade][activeTopic][activeBook];

window.open(encodeURI(file),"_blank");

status.innerText=`📖 Opened ${activeTopic} - ${activeBook}`;
hintBox.innerText="";
weakBox.innerText="";

document.documentElement.requestFullscreen?.();
}

function showHint(){
if(!activeTopic) return;

hintBox.innerText="💡 "+(hints[activeTopic]||hints.General);
}

function markWeak(){
if(!activeTopic || !activeBook) return;

weakBox.innerText=`⚠ Weak Topic Noted: ${activeTopic} (${activeBook})`;
}

document.addEventListener("visibilitychange",()=>{
if(document.hidden){
tabSwitches++;
focusBox.innerText=`⚠ Tab switched ${tabSwitches} time(s)`;

if(tabSwitches>=3){
focusBox.innerText="🔒 Too many distractions detected.";
}
}
});
</script>

</body>
</html>
