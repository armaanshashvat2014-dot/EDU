<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MentorLoop Smart Study</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBOP356DMuNyWQyHDbksw0i_dWXfXsbQvI",
  authDomain: "mentorloop-55a37.firebaseapp.com",
  projectId: "mentorloop-55a37",
  storageBucket: "mentorloop-55a37.firebasestorage.app",
  messagingSenderId: "322053863438",
  appId: "1:322053863438:web:c05dcb365853e04573a45f",
  measurementId: "G-PFT8KKBG4Q"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.db = db;
window.auth = auth;
window.currentUser = null;

onAuthStateChanged(auth, user=>{
  if(user){
    window.currentUser = user;
    loadUserData();
  }
});

window.saveStudyData = async function(data){
  if(!window.currentUser) return;

  await setDoc(
    doc(db,"studyProgress",window.currentUser.uid),
    data,
    { merge:true }
  );
}

window.loadUserData = async function(){
  if(!window.currentUser) return;

  const snap = await getDoc(doc(db,"studyProgress",window.currentUser.uid));
  if(!snap.exists()) return;

  const d = snap.data();

  if(d.streak){
    document.getElementById("streakBox").innerText =
      "🔥 Study streak: " + d.streak + " days";
  }
}
</script>

<style>
body{
margin:0;
padding:20px;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
text-align:center;
}
.container{max-width:900px;margin:auto;}
h1{color:#22d3ee;}
select,button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
font-size:15px;
}
button{
background:#22d3ee;
font-weight:bold;
cursor:pointer;
}
.info{
margin-top:15px;
font-weight:bold;
}
#highlightText{
margin-top:20px;
padding:18px;
background:#1e293b;
border-radius:12px;
cursor:pointer;
}
mark{
background:yellow;
color:black;
}
</style>
</head>
<body>

<div class="container">
<h1>📚 MentorLoop Smart Study</h1>

<select id="gradeSelect">
<option>Grade 7</option>
<option>Grade 8</option>
<option>Grade 9</option>
</select>

<select id="topicSelect">
<option>Math</option>
<option>Science</option>
<option>English</option>
</select>

<select id="bookSelect">
<option>Book 1</option>
<option>Book 2</option>
<option>Workbook</option>
</select>

<br>

<button onclick="openBook()">Open Book</button>
<button onclick="showHint()">Hint</button>
<button onclick="bookmarkPage()">Bookmark</button>
<button onclick="openAI()">Ask AI</button>
<button onclick="readAloud()">🔊 Read</button>

<div id="status" class="info"></div>
<div id="hintBox" class="info"></div>
<div id="weakBox" class="info"></div>
<div id="streakBox" class="info"></div>
<div id="recommendBox" class="info"></div>

<div id="highlightText" onclick="toggleHighlight(this)">
Tap this text to highlight important content.
</div>
</div>

<script>
let studyTime=0;
let weakCount=0;
let currentPage=1;

function getStudyKey(){
  return gradeSelect.value+"_"+topicSelect.value+"_"+bookSelect.value;
}

function openBook(){
  const key=getStudyKey();

  window.open("sample.pdf","_blank");

  status.innerText="📖 Book opened";
  increaseStreak();
  saveProgress();
  recommendNext();
}

function showHint(){
  weakCount++;
  hintBox.innerText="💡 Break difficult ideas into smaller steps.";

  if(weakCount>=2){
    weakBox.innerText="⚠ Weak topic detected: "+topicSelect.value;
    saveProgress();
  }
}

function bookmarkPage(){
  status.innerText="🔖 Page bookmarked";

  saveStudyData({
    bookmark:getStudyKey(),
    page:currentPage
  });
}

function toggleHighlight(el){
  if(el.innerHTML.includes("<mark>")){
    el.innerHTML="Tap this text to highlight important content.";
  }else{
    el.innerHTML="<mark>Tap this text to highlight important content.</mark>";
  }
}

function recommendNext(){
  recommendBox.innerText="➡ Recommended next: Workbook";
}

function increaseStreak(){
  let streak=Number(localStorage.getItem("ml_streak")||0)+1;
  localStorage.setItem("ml_streak",streak);

  streakBox.innerText="🔥 Study streak: "+streak+" days";

  saveStudyData({streak});
}

function readAloud(){
  const msg=new SpeechSynthesisUtterance(
    "Reading support activated for "+topicSelect.value
  );
  speechSynthesis.speak(msg);
}

function openAI(){
  window.open("https://complex-buddy-ai.lovable.app","_blank");
}

async function saveProgress(){
  await saveStudyData({
    lastBook:getStudyKey(),
    weakTopic: weakCount>=2 ? topicSelect.value : "",
    updated: Date.now()
  });
}

document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    studyTime++;
    if(studyTime>=3){
      status.innerText="⚠ Too many tab switches";
    }
  }
});
</script>

</body>
</html>
